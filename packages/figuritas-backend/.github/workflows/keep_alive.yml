name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # <--- ESTO permite que aparezca un botón para probarlo ya mismo

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/tu_tabla?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"